<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Harian</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e5df;
    --text: #1a1a18;
    --muted: #888580;
    --hint: #b8b4ae;
    --green: #1d6b47;
    --green-bg: #eaf5ee;
    --red: #b53b2e;
    --red-bg: #fdf0ee;
    --accent: #2b5fa8;
    --accent-bg: #eef3fc;
    --mono: 'DM Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }

  .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .top-bar h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .top-bar .date { font-size: 13px; color: var(--muted); }

  .balance-card {
    background: var(--text);
    color: #fff;
    border-radius: 16px;
    padding: 24px 20px 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .balance-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .balance-amount { font-family: var(--mono); font-size: 32px; font-weight: 500; letter-spacing: -1px; margin-bottom: 20px; }
  .balance-amount.negative { color: #ff8a80; }
  .balance-row { display: flex; gap: 16px; }
  .balance-sub { flex: 1; }
  .balance-sub-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .balance-sub-val { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .balance-sub-val.inc { color: #69e0a5; }
  .balance-sub-val.exp { color: #ff8a80; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .stat-card-val { font-family: var(--mono); font-size: 18px; font-weight: 500; }
  .stat-card-val.inc { color: var(--green); }
  .stat-card-val.exp { color: var(--red); }

  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; }

  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .type-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .type-btn {
    flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer;
    background: var(--bg); color: var(--muted); transition: all 0.15s;
  }
  .type-btn.active-in { background: var(--green-bg); color: var(--green); border-color: transparent; }
  .type-btn.active-out { background: var(--red-bg); color: var(--red); border-color: transparent; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select {
    padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: var(--sans); font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; transition: border 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }
  .form-group input[type=number] { font-family: var(--mono); }

  .submit-btn {
    width: 100%; padding: 11px; border: none; border-radius: var(--radius-sm);
    background: var(--text); color: #fff; font-family: var(--sans); font-size: 14px;
    font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .list-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .date-nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; color: var(--muted); font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { background: var(--border); }
  #date-label { font-size: 13px; color: var(--muted); min-width: 80px; text-align: center; }

  .filter-row { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .filter-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: var(--sans); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: transparent; }

  .entry { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .entry:last-child { border-bottom: none; }
  .entry-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-in { background: var(--green); }
  .dot-out { background: var(--red); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-amount { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .entry-saldo { font-size: 11px; color: var(--hint); margin-top: 2px; font-family: var(--mono); }
  .amount-in { color: var(--green); }
  .amount-out { color: var(--red); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--hint); font-size: 15px; padding: 4px; border-radius: 4px; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); background: var(--red-bg); }

  .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }

  .saldo-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; }
  .saldo-row { display: flex; align-items: center; gap: 10px; }
  .saldo-row label { font-size: 13px; color: var(--muted); white-space: nowrap; font-weight: 500; }
  .saldo-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--mono); font-size: 14px; color: var(--text); background: var(--bg); outline: none; }
  .saldo-row input:focus { border-color: var(--accent); background: #fff; }
  .saldo-save { padding: 8px 14px; border: none; border-radius: var(--radius-sm); background: var(--accent-bg); color: var(--accent); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .saldo-save:hover { background: var(--accent); color: #fff; }
  .saldo-note { font-size: 12px; color: var(--hint); margin-top: 8px; }

  .status-bar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 13px; }
  .status-bar.loading { background: var(--accent-bg); color: var(--accent); }
  .status-bar.success { background: var(--green-bg); color: var(--green); }
  .status-bar.error { background: var(--red-bg); color: var(--red); }
  .status-bar.hidden { display: none; }

  .spinner { width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .balance-amount { font-size: 26px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <h1>Kas Harian</h1>
    <span class="date" id="top-date"></span>
  </div>

  <div class="balance-card">
    <div class="balance-label">Saldo akhir hari ini</div>
    <div class="balance-amount" id="bal-akhir">Rp 0</div>
    <div class="balance-row">
      <div class="balance-sub">
        <div class="balance-sub-label">Saldo awal</div>
        <div class="balance-sub-val" id="bal-awal-hari">Rp 0</div>
      </div>
      <div class="balance-sub">
        <div class="balance-sub-label">Pemasukan</div>
        <div class="balance-sub-val inc" id="bal-in">+ Rp 0</div>
      </div>
      <div class="balance-sub">
        <div class="balance-sub-label">Pengeluaran</div>
        <div class="balance-sub-val exp" id="bal-out">- Rp 0</div>
      </div>
    </div>
  </div>

  <div id="status-bar" class="status-bar hidden"></div>

  <div class="saldo-section">
    <div class="saldo-row">
      <label>Saldo awal</label>
      <input type="number" id="inp-saldo-awal" placeholder="0">
      <button class="saldo-save" onclick="saveSaldoAwal()">Simpan</button>
    </div>
    <div class="saldo-note" id="saldo-note">Isi saldo awal kas kamu, tekan Simpan.</div>
  </div>

  <div class="section-title">Tambah Transaksi</div>
  <div class="form-card">
    <div class="type-toggle">
      <button class="type-btn active-in" id="btn-in" onclick="setType('income')">+ Pemasukan</button>
      <button class="type-btn" id="btn-out" onclick="setType('expense')">− Pengeluaran</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="inp-date">
      </div>
      <div class="form-group">
        <label>Jumlah (Rp)</label>
        <input type="number" id="inp-amount" placeholder="0" min="0">
      </div>
      <div class="form-group full">
        <label>Keterangan</label>
        <input type="text" id="inp-desc" placeholder="Contoh: Makan siang, Gaji...">
      </div>
      <div class="form-group full">
        <label>Kategori</label>
        <select id="inp-cat">
          <option value="Food">Makanan & Minuman</option>
          <option value="Transportation">Transportasi</option>
          <option value="Personal">Belanja Pribadi</option>
          <option value="Health/medical">Kesehatan</option>
          <option value="Utilities">Tagihan & Utilitas</option>
          <option value="Travel">Hiburan & Travel</option>
          <option value="Home">Rumah</option>
          <option value="Paycheck">Gaji / Penghasilan</option>
          <option value="Savings">Tabungan</option>
          <option value="Other">Lainnya</option>
        </select>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="addTransaction()">Simpan ke Google Sheets</button>
  </div>

  <div class="list-card">
    <div class="list-header">
      <span class="section-title" style="margin:0">Riwayat</span>
      <div class="date-nav">
        <button class="nav-btn" onclick="shiftDay(-1)">&#8249;</button>
        <span id="date-label">Hari ini</span>
        <button class="nav-btn" onclick="shiftDay(1)">&#8250;</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">Semua</button>
      <button class="filter-btn" onclick="setFilter('income',this)">Pemasukan</button>
      <button class="filter-btn" onclick="setFilter('expense',this)">Pengeluaran</button>
    </div>
    <div id="entry-list"><div class="empty"><div class="empty-icon">⟳</div>Memuat data...</div></div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkzasgLME_WjAT0l7Z8WxmE8Kn6alX-FBJWIi3Pm-g_zk4-LiabdurmsymfVOrh_A/exec';

let transactions = [];
let saldoAwal = 0;
let currentType = 'income';
let currentFilter = 'all';
let viewDate = null;

function today() { return new Date().toISOString().split('T')[0]; }

function fmtRp(n) {
  const abs = Math.abs(Math.round(n));
  return 'Rp ' + abs.toLocaleString('id-ID');
}

function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
}

function showStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.className = 'status-bar ' + type;
  el.innerHTML = type === 'loading' ? `<div class="spinner"></div>${msg}` : msg;
  if (type !== 'loading') setTimeout(() => el.classList.add('hidden'), 3000);
}

function hideStatus() { document.getElementById('status-bar').classList.add('hidden'); }

function init() {
  viewDate = today();
  document.getElementById('inp-date').value = viewDate;
  document.getElementById('top-date').textContent = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const savedSaldo = localStorage.getItem('kas_saldo_awal');
  if (savedSaldo) {
    saldoAwal = parseFloat(savedSaldo) || 0;
    document.getElementById('inp-saldo-awal').value = saldoAwal;
    document.getElementById('saldo-note').textContent = 'Saldo awal: ' + fmtRp(saldoAwal);
  }

  loadFromSheets();
}

async function loadFromSheets() {
  showStatus('Memuat data dari Google Sheets...', 'loading');
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    transactions = (data.transactions || []).map(t => ({
      ...t,
      date: typeof t.date === 'string' ? t.date : new Date(t.date).toISOString().split('T')[0],
      amount: parseFloat(t.amount) || 0
    }));
    transactions.sort((a, b) => a.date.localeCompare(b.date));
    hideStatus();
    render();
  } catch (e) {
    showStatus('Gagal memuat data. Periksa koneksi internet.', 'error');
    render();
  }
}

function saveSaldoAwal() {
  const val = parseFloat(document.getElementById('inp-saldo-awal').value) || 0;
  saldoAwal = val;
  localStorage.setItem('kas_saldo_awal', val);
  document.getElementById('saldo-note').textContent = 'Saldo awal tersimpan: ' + fmtRp(val);
  render();
}

function setType(type) {
  currentType = type;
  document.getElementById('btn-in').className = 'type-btn' + (type === 'income' ? ' active-in' : '');
  document.getElementById('btn-out').className = 'type-btn' + (type === 'expense' ? ' active-out' : '');
  document.getElementById('inp-cat').value = type === 'income' ? 'Paycheck' : 'Food';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function shiftDay(n) {
  const d = new Date(viewDate + 'T00:00:00');
  d.setDate(d.getDate() + n);
  viewDate = d.toISOString().split('T')[0];
  const t = today();
  document.getElementById('date-label').textContent = viewDate === t ? 'Hari ini' : fmtDate(viewDate);
  render();
}

async function addTransaction() {
  const date = document.getElementById('inp-date').value || today();
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const description = document.getElementById('inp-desc').value.trim();
  const category = document.getElementById('inp-cat').value;

  if (!amount || amount <= 0 || !description) {
    showStatus('Lengkapi jumlah dan keterangan ya!', 'error');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('Menyimpan ke Google Sheets...', 'loading');

  const payload = { type: currentType, date, amount, description, category };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    transactions.push({ ...payload, date });
    transactions.sort((a, b) => a.date.localeCompare(b.date));

    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-desc').value = '';
    viewDate = date;
    document.getElementById('date-label').textContent = viewDate === today() ? 'Hari ini' : fmtDate(viewDate);

    showStatus('✓ Tersimpan di Google Sheets!', 'success');
    render();
  } catch (e) {
    showStatus('Gagal menyimpan. Coba lagi.', 'error');
  }

  btn.disabled = false;
}

function render() {
  const allSorted = [...transactions].sort((a, b) => a.date.localeCompare(b.date));
  let running = saldoAwal;
  const withSaldo = allSorted.map(e => {
    running += e.type === 'income' ? e.amount : -e.amount;
    return { ...e, saldoSetelah: running };
  });

  const dayAll = withSaldo.filter(e => e.date === viewDate);
  const totalIn = dayAll.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const totalOut = dayAll.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);

  const before = withSaldo.filter(e => e.date < viewDate);
  const saldoAwalHari = before.length > 0 ? before[before.length - 1].saldoSetelah : saldoAwal;
  const saldoAkhir = saldoAwalHari + totalIn - totalOut;

  document.getElementById('bal-awal-hari').textContent = fmtRp(saldoAwalHari);
  document.getElementById('bal-in').textContent = '+ ' + fmtRp(totalIn);
  document.getElementById('bal-out').textContent = '- ' + fmtRp(totalOut);
  const balEl = document.getElementById('bal-akhir');
  balEl.textContent = (saldoAkhir < 0 ? '-' : '') + fmtRp(saldoAkhir);
  balEl.className = 'balance-amount' + (saldoAkhir < 0 ? ' negative' : '');

  const filtered = dayAll.filter(e => currentFilter === 'all' || e.type === currentFilter);
  const list = document.getElementById('entry-list');

  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Belum ada transaksi hari ini</div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => (b.rowIndex || 0) - (a.rowIndex || 0));
  list.innerHTML = sorted.map((e, idx) => `
    <div class="entry" id="entry-${idx}">
      <div class="entry-dot ${e.type === 'income' ? 'dot-in' : 'dot-out'}"></div>
      <div class="entry-info">
        <div class="entry-desc">${e.description}</div>
        <div class="entry-meta">${e.category}</div>
      </div>
      <div class="entry-right">
        <div class="entry-amount ${e.type === 'income' ? 'amount-in' : 'amount-out'}">${e.type === 'income' ? '+' : '-'}${fmtRp(e.amount)}</div>
        <div class="entry-saldo">${fmtRp(e.saldoSetelah)}</div>
      </div>
      <button class="del-btn" onclick="deleteTransaction(${JSON.stringify(e).split('"').join('&quot;')}, ${idx})" title="Hapus">✕</button>
    </div>
  `).join('');
}

async function deleteTransaction(e, idx) {
  if (!confirm(`Hapus "${e.description}" — ${fmtRp(e.amount)}?`)) return;

  showStatus('Menghapus dari Google Sheets...', 'loading');

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'delete',
        type: e.type,
        date: e.date,
        amount: e.amount,
        description: e.description
      })
    });

    transactions = transactions.filter(t =>
      !(t.date === e.date && t.amount === e.amount && t.description === e.description && t.type === e.type)
    );

    showStatus('✓ Transaksi dihapus!', 'success');
    render();
  } catch (err) {
    showStatus('Gagal menghapus. Coba lagi.', 'error');
  }
}

init();
</script>
</body>
</html>
